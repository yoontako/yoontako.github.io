<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#9AEBA3">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vibrant Social Links</title>
    <style>
        :root {
            --bg-color-1: #9AEBA3;
            --bg-color-2: #45C4B0;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-primary: #333333;
            --text-secondary: #666666;

        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
            background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2));
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .profile {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--bg-color-1);
            transition: transform 0.3s ease;
        }
        .profile img:hover {
            transform: scale(1.05);
        }
        .profile h1 {
            margin: 1rem 0 0.5rem;
            color: var(--text-primary);
            font-size: 2rem;
        }
        .profile p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 1.1rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .link {
            background-color: var(--card-bg);
            border: 2px solid;
            border-radius: 50px;
            padding: 1rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .link:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transition: all 0.5s;
        }
        .link:hover:before {
            left: 100%;
        }
        .link:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .link svg {
            width: 30px;
            height: 30px;
            margin-right: 1rem;
            transition: transform 0.3s ease;
        }
        .link:hover svg {
            transform: scale(1.2) rotate(5deg);
        }

        .contact-button {
            margin-top: 2rem;
            background-color: var(--accent-7);
            color: white;
            background-color: #00ABBD;
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .contact-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 211, 153, 0.4);
        }
        .contact-button svg {
            width: 24px;
            height: 24px;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>

            <h1>h.takker</h1>
